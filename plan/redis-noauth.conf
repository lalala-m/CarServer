# Redis配置文件 - 无密码版本
# 用于本地开发

# 绑定地址
bind 127.0.0.1

# 端口
port 6379

# 关闭密码保护（仅用于本地开发）
# requirepass yourpassword

# 关闭保护模式
protected-mode no

# 守护进程运行
daemonize yes

# 日志文件
loglevel notice
logfile ""

# 数据库文件
dir ./
dbfilename dump.rdb

# 保存策略（关闭RDB持久化，仅用于开发）
save ""

# 最大内存（根据需要调整）
maxmemory 256mb
maxmemory-policy allkeys-lru
