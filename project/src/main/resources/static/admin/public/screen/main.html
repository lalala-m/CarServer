                if (!permissions){
                    return null;
                }
                let list = permissions;
                let obj;
                for (var i = 0; i < list.length; i++) {
                    var o = list[i];
                    if (o.path === path) {
                        obj = o;
                        break;
                    }
                }
                return obj;

            /**
             * 是否有统计字段的权限
             */
            function $check_figure(path) {

        // 通过 user_id 获取 nickname
        function getNicknameByUserId(userId) {
            const user = userListCache.find(u => u.user_id === userId);
            return user ? user.nickname : '未知用户';
        }

        // 获取地址
        function fullUrl(url) {
            var url_new = "";
            if (url) {
                if (url.indexOf("~/") === 0) {
                    url_new = url.replace('~/', baseUrl+'/');
                } else if (url.indexOf("/http://") === 0) {
                    url_new = url.replace('/http://', 'http://');
                } else if (url.indexOf("/") === 0) {
                    url_new = url.replace('/', baseUrl+'/');
                } else if (url.indexOf("~") === 0) {
                    url_new = url.replace('~', '');
                } else {
                    url_new = url;
                }
            }
            return url_new;
        }

        // 处理时间
        function toTime(time, format) {
            let ret = "";
            if(time){
                let is_date = time instanceof Date;
                let is_num = typeof(time) == 'number';
                if(is_date){
                    ret = toStr(time,format);
                }
                else if(is_num){
                    let t = new Date(time);
                    ret = toStr(t,format);
                }
                else {
                    let reg = /^(20|21|22|23|[0-1]\d):[0-5]\d:[0-5]\d$/;
                    let regExp = new RegExp(reg);
                    if(regExp.test(time)){
                        ret = time;
                    }else {
                        ret = toDateStr(new Date(time.replace('T', ' ').replace('Z', '').replaceAll('-', '/')),format);
                    }
                }
            }
            return ret;
        }

        function toStr(t,format) {
            var o = {
                "M+": t.getMonth() + 1,
                "d+": t.getDate(),
                "h+": t.getHours(),
                "m+": t.getMinutes(),
                "s+": t.getSeconds(),
                "q+": Math.floor((t.getMonth() + 3) / 3),
                "S": t.getMilliseconds()
            };
            if (/(y+)/.test(format)) {
                var x = RegExp.$1;
                format = format.replace(x, (t.getFullYear() + "").substr(4 - x.length));
            }
            for (var k in o) {
                if (new RegExp("(" + k + ")").test(format)) {
                var x = RegExp.$1;
                format = format.replace(x, x.length == 1 ? o[k] : ("00" + o[k]).substr(("" + o[k]).length));
                }
            }
            return format;
        }

        function toDateStr(time,format) {
            let o = {
                "M+": time.getMonth() + 1,
                "d+": time.getDate(),
                "h+": time.getHours(),
                "m+": time.getMinutes(),
                "s+": time.getSeconds(),
                "q+": Math.floor((time.getMonth() + 3) / 3),
                "S": time.getMilliseconds()
            };
            if (/(y+)/.test(format)) {
                let x = RegExp.$1;
                format = format.replace(x, (time.getFullYear() + "").substr(4 - x.length));
            }
            for (let k in o) {
                if (new RegExp("(" + k + ")").test(format)) {
                    let x = RegExp.$1;
                    format = format.replace(x, x.length === 1 ? o[k] : ("00" + o[k]).substr(("" + o[k]).length));
                }
            }
            return format;
        }

                    queryStr = queryStr.substring(0,queryStr.length-1);
            let queryData = {}
                    if (user_group!='管理员'){
                            let sqlwhere = "(";
                                                                                                                                                                                                    if (user_group=="车主用户"){
                    sqlwhere+= "owner_user = " + user_id + " or ";
                }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    if (user_group=="销售经理"){
                    sqlwhere+= "sales_manager = " + user_id + " or ";
                }
                                                                        if (user_group=="经理用户"){
                    sqlwhere+= "account_manager = " + user_id + " or ";
                }
                                                    if (sqlwhere.length>1){
                    sqlwhere = sqlwhere.substr(0,sqlwhere.length-4);
                    sqlwhere += ")";
                    queryData.sqlwhere = sqlwhere;
                }
                        }
                    let queryString = '';
            if (Object.keys(queryData).length > 0){
                queryString = '&'+new URLSearchParams(queryData).toString();
            }
            await fetch(baseUrl + '/api/reservation_record/bar_group?field='+queryStr+'&groupby=service_name'+queryString)
                    .then(res => res.json())
                    .then(data => {
                        if (data.result && data.result.list && data.result.list.length > 0) {
                            // 解析接口数据
                            let list = data.result.list;
                            let barLabels = []
                            for (let i = 0; i < list.length; i++) {
                                        barLabels.push(list[i][0])
                            }
                            if (bar_chart_reservation_record_7_Interval) clearInterval(bar_chart_reservation_record_7_Interval);
                            const { intervalId } = initBarChartWithAutoScroll(
                            	document.getElementById('bar_chart_reservation_record_7'),
                            	list,
                            	barLabels,
                            	seriesNames
                            );
                            bar_chart_reservation_record_7_Interval = intervalId; // 保存定时器ID
                        }else{
                            showNoDataPlaceholder(bar_chart_reservation_record_7, '');
                        }
                    })
                    .catch(err => {
                        console.error('获取柱状图数据失败:', err);
                    });
        }
        document.addEventListener('DOMContentLoaded', function() {
            update_bar_chart_reservation_record_7();
        });
